menu_title: "&8Blacksmith"
open_command: blacksmith
size: 27

items:

  filler:
    material: GRAY_STAINED_GLASS_PANE
    display_name: " "
    slots:
      - 0-27

  # =========================
  # Stone SWORD
  # =========================
  stone_sword_buy:
    material: STONE_SWORD
    slot: 10
    display_name: "&fIron Sword"
    lore:
      - "&aPrice: $120"
      - "&7Left-click to purchase for $120"
      - "&7Right-click to sell for $60"

    left_click_requirement:
      requirements:
        money_check:
          type: '>='
          input: '%vault_eco_balance%'
          output: 120

      deny_commands:
        - "[message] &cYou don't have enough money! Need $120."

    left_click_commands:
      - "[console] eco take %player_name% 120"
      - "[console] give %player_name% stone_sword 1"
      - "[message] &aPurchase successful! &fStone Sword acquired."

    right_click_requirement:
      requirements:
        has_item:
          type: has item
          material: STONE_SWORD
          amount: 1

      deny_commands:
        - "[message] &cYou don't have an Stone Sword to sell."

    right_click_commands:
      - "[console] clear %player_name% stone_sword 1"
      - "[console] eco give %player_name% 60"
      - "[message] &aSold Stone Sword for &e$250&a!"
      
