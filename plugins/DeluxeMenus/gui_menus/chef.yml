menu_title: "&8Chef"
open_command: chef
size: 27

items:

  filler:
    material: GRAY_STAINED_GLASS_PANE
    display_name: " "
    slots:
      - 0-27

  # =========================
  # COOKED STEAK (32)
  # =========================
  steak_buy:
    material: COOKED_BEEF
    slot: 11
    display_name: "&fCooked Steak (32)"
    lore:
      - "&aPrice: $75"
      - "&7Left-click to purchase for $75"
      - "&7Right-click to sell for $40"

    left_click_requirement:
      requirements:
        money_check:
          type: '>='
          input: '%vault_eco_balance%'
          output: 75

      deny_commands:
        - "[message] &cYou don't have enough money! Need $75."

    left_click_commands:
      - "[console] eco take %player_name% 75"
      - "[console] give %player_name% cooked_beef 32"
      - "[message] &aPurchased 32 Cooked Steak!"

    right_click_requirement:
      requirements:
        has_item:
          type: has item
          material: COOKED_BEEF
          amount: 32

      deny_commands:
        - "[message] &cYou don't have enough steak to sell."

    right_click_commands:
      - "[console] clear %player_name% cooked_beef 32"
      - "[console] eco give %player_name% 40"
      - "[message] &aSold 32 Cooked Steak for &e$40&a!"

