menu_title: "&8Armorer"
open_command: armorer
size: 54

items:

  filler:
    material: GRAY_STAINED_GLASS_PANE
    display_name: " "
    slots:
      - 0-54

  # =========================
  # Chain Armor
  # =========================
  chainhelm_buy:
    material: CHAINMAIL_HELMET
    slot: 11
    display_name: "&fChainmail Helmet"
    lore:
      - "&aPrice: $200"
      - "&7Left-click to purchase for $200"
      - "&7Right-click to sell for $100"

    left_click_requirement:
      requirements:
        money_check:
          type: '>='
          input: '%vault_eco_balance%'
          output: 200

      deny_commands:
        - "[message] &cYou don't have enough money! Need $200."

    left_click_commands:
      - "[console] eco take %player_name% 200"
      - "[console] give %player_name% chainmail_helmet 1"
      - "[message] &aPurchase successful! &fChainmail Helmet acquired."

    right_click_requirement:
      requirements:
        has_item:
          type: has item
          material: CHAINMAIL_HELMET
          amount: 1

      deny_commands:
        - "[message] &cYou don't have a Chainmail Helmet to sell."

    right_click_commands:
      - "[console] clear %player_name% chainmail_helmet 1"
      - "[console] eco give %player_name% 100"
      - "[message] &aSold Chainmail Helmet for &e$100&a!"
      
