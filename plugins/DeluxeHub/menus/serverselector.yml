# Server Selector GUI
# The ID of this inventory is 'serverselector' which you can open using the [MENU] action (e.g. "[MENU] serverselector").
# You can create more custom GUIs, just copy this entire file and paste a new one in the "menus" directory. The name of the file is the menu ID.
#
# PLAYER HEADS
#   You can have player heads, using player names, base64 or HeadDatabase IDs.
#   Examples
#     Username (must have logged into the server once)
#       material: PLAYER_HEAD
#       username: <name>
#
#     Base64
#       material: PLAYER_HEAD
#       base64: <base64 id>
#
#
# ITEM FLAGS
#   You can add flags to the item (https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/inventory/ItemFlag.html)
#   Example:
#     item_flags:
#       - HIDE_ATTRIBUTES
#       - HIDE_DESTROYS
#       - HIDE_ENCHANTS
#       - HIDE_PLACED_ON
#       - HIDE_POTION_EFFECTS
#       - HIDE_UNBREAKABLE
#
# ITEM ACTIONS
#   All item actions can be found here https://wiki.lewisdev.fun/free-resources/deluxehub/action-types

# Slots of the GUI
slots: 27

# Title of the GUI
title: "Gamemode Selector"

# Automatically update open inventories.
# This can be used to update placeholders in the GUI.
refresh:
  enabled: false
  rate: 40

# The items inside the GUI can be listed here
items:
  filler:
    material: GRAY_STAINED_GLASS_PANE
    display_name: '&8Gamemode Selector'
    slot: -1 # Setting the slot to -1 will fill every empty slot, you can also do "slots: [0, 1, 2]"
    
  Casino:
    material: STICK
    custom_model_data: 10005
    slot: 10
    amount: 1
    glow: true
    display_name: '&eCasino'
    lore:
      - '&bBuild your wealth!'
      - '&cOr lose it all.'
      - '&7Join now!'
      
    actions:
      - '[CLOSE]'
      - '[MESSAGE] &7Sending you to: &eCasino'
      - '[CONSOLE] mvtp %player% world'
      # For multi-world servers using Multiverse-Core, use the action:
      # - '[CONSOLE] mvtp %player% world'

  Smash:
    material: DIAMOND_SWORD
    custom_model_data: 10003
    slot: 13
    amount: 1
    glow: true
    display_name: '&6Smash'
    lore:
      - '&bUse casino earnings to'
      - '&bpurchase custom loadouts'
      - '&band defeat your enemies.'
      - '&7Join now!'
      
    actions:
      - '[CLOSE]'
      - '[MESSAGE] &7Sending you to: &eSmash'
      - '[CONSOLE] mvtp %player% ssbhub'
      # For multi-world servers using Multiverse-Core, use the action:
      # - '[CONSOLE] mvtp %player% world'
      
  Extraction:
    material: FEATHER
    custom_model_data: 10008
    slot: 16
    amount: 1
    glow: true
    display_name: '&6Extraction'
    lore:
      - '&bUse casino earnings to'
      - '&bbuild your own loadout.'
      - '&cFight your way and get out alive.'
      - '&7Join now!'
      
    actions:
      - '[CLOSE]'
      - '[MESSAGE] &c&lUNDER CONSTRUCTION'
      # For multi-world servers using Multiverse-Core, use the action:
      # - '[CONSOLE] mvtp %player% world'